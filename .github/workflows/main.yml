name: Build and Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: markobugbg/simple-monitoring:${{ github.run_id }}

    - name: Execute remote SSH commands
      uses: appleboy/ssh-action@v1
      env:
        SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22
        envs: SLACK_BOT_TOKEN
        script: |
          docker pull markobugbg/simple-monitoring:${{ github.run_id }} || true
          docker stop simple-monitoring || true
          docker rm simple-monitoring || true
          docker run -d -e SLACK_BOT_TOKEN="$SLACK_BOT_TOKEN" --name simple-monitoring markobugbg/simple-monitoring:${{ github.run_id }}
